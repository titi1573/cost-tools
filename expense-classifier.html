<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>费用报销自动分类器</title>
<script src="xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f1f5f9;color:#1a202c;line-height:1.6}
.container{max-width:1400px;margin:0 auto;padding:20px}
h1{font-size:1.8rem;color:#1e3a5f;margin-bottom:4px}
.subtitle{color:#6b7280;margin-bottom:20px;font-size:.9rem}

.section{background:#fff;border-radius:14px;padding:20px 24px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04);border:1px solid #e5e7eb}
.section h2{font-size:1.1rem;color:#1e3a5f;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.hero{background:linear-gradient(135deg,#1e3a5f,#7c3aed);border-radius:14px;padding:28px 28px 22px;color:#fff;margin-bottom:20px}
.hero h1{font-size:1.8rem;color:#fff}
.badges{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.badge{background:rgba(255,255,255,.15);padding:5px 14px;border-radius:20px;font-size:.78rem}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:900px){.grid-2{grid-template-columns:1fr}}

.paste-box{border:2px dashed #cbd5e0;border-radius:10px;padding:20px;text-align:center;color:#9ca3af;margin-bottom:12px;background:#fafbfc}
textarea{width:100%;height:180px;font-family:"SF Mono",Consolas,monospace;font-size:.84rem;padding:14px;border:2px solid #e5e7eb;border-radius:10px;resize:vertical;line-height:1.7;background:#f9fafb}
textarea:focus{outline:none;border-color:#3b82f6;background:#fff}

.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border:none;border-radius:8px;font-size:.85rem;cursor:pointer;font-weight:600;transition:all .15s}
.btn-primary{background:#3b82f6;color:#fff}.btn-primary:hover{background:#2563eb}
.btn-success{background:#16a34a;color:#fff}.btn-success:hover{background:#15803d}
.btn-outline{background:#fff;color:#3b82f6;border:1.5px solid #3b82f6}.btn-outline:hover{background:#eff6ff}
.btn-danger{background:#fee2e2;color:#991b1b}.btn-danger:hover{background:#fecaca}
.btn-row{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;align-items:center}

.upload-btn{position:relative;display:inline-flex;align-items:center;gap:4px;padding:8px 16px;background:#eff6ff;color:#3b82f6;border:1px dashed #3b82f6;border-radius:8px;font-size:.84rem;cursor:pointer;font-weight:600}
.upload-btn:hover{background:#dbeafe;border-style:solid}
.upload-btn input{position:absolute;inset:0;opacity:0;cursor:pointer}
.status{font-size:.78rem;font-weight:600;color:#16a34a;margin-left:4px}

table{width:100%;border-collapse:collapse;font-size:.85rem}
th,td{padding:9px 10px;text-align:left;border-bottom:1px solid #e5e7eb}
th{background:#f9fafb;color:#4a5568;font-weight:700;font-size:.75rem;position:sticky;top:0;z-index:1}
td.num{text-align:right}
tr:hover{background:#f9fafb}
.cat-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.72rem;font-weight:700}
.bg-A{background:#dbeafe;color:#1e40af}.bg-B{background:#f3e8ff;color:#6b21a8}
.bg-C{background:#fee2e2;color:#991b1b}.bg-D{background:#dcfce7;color:#166534}
.bg-E{background:#fef3c7;color:#92400e}.bg-F{background:#ffedd5;color:#9a3412}
.bg-G{background:#e5e7eb;color:#374151}.bg-H{background:#fce7f3;color:#9d174d}
.bg-X{background:#f3f4f6;color:#6b7280}

.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px}
.summary-card{background:#f9fafb;border-radius:10px;padding:14px;text-align:center;border-left:3px solid transparent}
.summary-card .value{font-size:1.3rem;font-weight:800}
.summary-card .label{font-size:.76rem;color:#6b7280;margin-top:2px}

.pie-box{display:flex;align-items:center;gap:24px;flex-wrap:wrap;margin-bottom:14px}
.pie{width:160px;height:160px;border-radius:50%}
.legend{display:flex;flex-direction:column;gap:4px;font-size:.84rem}
.legend span{display:flex;align-items:center;gap:6px}
.legend .dot{width:10px;height:10px;border-radius:2px;display:inline-block}

.cat-summary td{padding:6px 12px}
.cat-summary .bar{width:100px;height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle}
.cat-summary .bar-fill{height:100%;border-radius:3px}

.rule-section{background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:14px;margin-top:10px}
.rule-row{display:flex;gap:8px;align-items:center;margin-bottom:6px;flex-wrap:wrap}
.rule-row select,.rule-row input{padding:6px 10px;border:1px solid #e5e7eb;border-radius:6px;font-size:.84rem}
.rule-row input{flex:2;min-width:150px}

.hidden{display:none!important}
.footer{text-align:center;padding:20px;color:#9ca3af;font-size:.76rem}
</style>
</head>
<body>
<div class="container">
<div class="hero">
  <h1>费用报销自动分类器</h1>
  <p style="opacity:.85;margin-top:4px">粘贴报销明细或上传Excel → 自动按关键词归入会计科目 → 汇总分析 → 导出分类表</p>
  <div class="badges">
    <span class="badge">12个会计科目</span><span class="badge">150+关键词</span><span class="badge">纯本地运行</span>
  </div>
</div>

<div class="section">
  <h2>数据输入</h2>
  <div class="grid-2">
    <div>
      <div class="paste-box">
        <div style="font-size:2rem;margin-bottom:6px">📋</div>
        <div style="margin-bottom:6px">粘贴报销数据，或上传Excel文件自动填写</div>
        <div style="display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap">
          <label class="upload-btn"><input type="file" accept=".xlsx,.xls,.csv" onchange="handleUpload(this)"> 上传Excel文件</label>
          <span class="status hidden" id="status"></span>
          <a href="模板_费用报销明细表.xlsx" download style="font-size:.78rem;color:#3b82f6;font-weight:600;text-decoration:underline">下载模板</a>
        </div>
      </div>
      <textarea id="rawInput" placeholder="每行一条费用记录。格式灵活，系统自动识别金额列。&#10;&#10;示例：&#10;2024-03-15	358.00	A4纸 墨盒	行政部&#10;03.16	1200.00	服务器租用费	技术部&#10;2024-03-18	186.50	滴滴打车 拜访客户	销售部-张三"></textarea>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="doClassify()">自动分类</button>
        <button class="btn btn-outline" onclick="clearAll()">清空</button>
        <span style="font-size:.82rem;color:#6b7280;margin-left:auto">已解析 <strong id="parseCount">0</strong> 条</span>
      </div>
    </div>
    <div>
      <div class="rule-section">
        <div style="font-weight:700;font-size:.85rem;color:#374151;margin-bottom:8px">分类规则（可自定义）</div>
        <div style="font-size:.75rem;color:#9ca3af;margin-bottom:8px">关键词命中即归入对应科目。多个关键词用逗号分隔。</div>
        <div id="ruleBody"></div>
        <button class="btn btn-outline" style="font-size:.78rem;padding:5px 12px" onclick="addRule()">+ 添加规则</button>
        <button class="btn" style="font-size:.78rem;padding:5px 12px;background:#f3f4f6;color:#4a5568;margin-left:8px" onclick="resetRules()">恢复默认</button>
      </div>
    </div>
  </div>
</div>

<div id="resultArea" class="hidden">
  <div class="section">
    <h2>分类汇总</h2>
    <div class="pie-box">
      <div class="pie" id="pieChart"></div>
      <div class="legend" id="pieLegend"></div>
    </div>
    <div class="summary-grid" id="summaryGrid"></div>
    <table class="cat-summary" style="width:auto;min-width:500px">
      <thead><tr><th>科目</th><th>条数</th><th>金额合计</th><th>占比</th><th></th></tr></thead>
      <tbody id="catSummaryBody"></tbody>
    </table>
  </div>

  <div class="section">
    <h2>分类明细</h2>
    <div style="overflow-x:auto;max-height:500px;overflow-y:auto">
      <table>
        <thead><tr><th style="width:40px">#</th><th style="width:100px">日期</th><th>摘要</th><th style="width:100px">金额</th><th style="width:120px">自动分类</th><th>命中关键词</th></tr></thead>
        <tbody id="detailBody"></tbody>
      </table>
    </div>
    <div class="btn-row">
      <button class="btn btn-success" onclick="exportResult()">导出 Excel 分类表</button>
    </div>
  </div>
</div>

<div class="footer">费用报销自动分类器 · 纯前端本地运行 · 数据不上传 · 免费使用</div>
</div>

<script>
// ====== RULES ======
var rules = [
  {kw:'办公用品,A4纸,笔,墨盒,硒鼓,文具,文件夹,打印,复印',cat:'A',name:'办公费'},
  {kw:'快递,顺丰,中通,圆通,韵达,EMS,邮寄,运费',cat:'B',name:'快递/物流费'},
  {kw:'差旅,机票,火车票,酒店,住宿,出差,滴滴,打车,交通,地铁,加油,过路,停车',cat:'C',name:'差旅/交通费'},
  {kw:'招待,宴请,餐饮,请客,应酬,商务,饭局,客户餐',cat:'D',name:'业务招待费'},
  {kw:'服务器,软件,SaaS,域名,SSL,云服务,阿里云,腾讯云,AWS,IT,带宽,CDN,网站',cat:'E',name:'IT/技术服务费'},
  {kw:'律师,法律,咨询,顾问,审计,评估,检测,认证',cat:'F',name:'咨询/专业服务费'},
  {kw:'电费,水费,租金,物业,暖气,网费,电话,保洁,保安,维修,装修,绿植,桶装水',cat:'G',name:'管理费用-其他'},
  {kw:'广告,推广,营销,百度,巨量,抖音,信息流,SEO,投放,流量',cat:'H',name:'广告/推广费'},
  {kw:'培训,课程,学习,报名,考试,认证,继续教育',cat:'I',name:'培训/教育费'},
  {kw:'工资,社保,公积金,奖金,福利,体检,团建,生日,节日',cat:'J',name:'人工/福利费'},
  {kw:'银行,手续费,利息,汇款,转账,财务费',cat:'K',name:'财务费用'},
  {kw:'折旧,摊销,固定资产,设备,电脑,打印机,家具',cat:'L',name:'折旧/摊销'},
];
var catColor = {A:'#3b82f6',B:'#8b5cf6',C:'#ef4444',D:'#16a34a',E:'#eab308',F:'#f97316',G:'#6b7280',H:'#ec4899',I:'#6366f1',J:'#f43f5e',K:'#14b8a6',L:'#9ca3af',X:'#d1d5db'};
var catBg = {A:'bg-A',B:'bg-B',C:'bg-C',D:'bg-D',E:'bg-E',F:'bg-F',G:'bg-G',H:'bg-H',X:'bg-X'};
var entries = [];

// ====== RULE UI ======
function renderRules() {
  document.getElementById('ruleBody').innerHTML = rules.map(function(r,i){
    var opts = rules.map(function(rr){return '<option value="'+rr.cat+'"'+(rr.cat===r.cat?' selected':'')+'>'+rr.name+'</option>';}).join('');
    return '<div class="rule-row"><select onchange="rules['+i+'].cat=this.value;saveRules()">'+opts+'</select><input value="'+r.kw+'" onchange="rules['+i+'].kw=this.value;saveRules()" placeholder="关键词（逗号分隔）"><button class="btn btn-danger" style="font-size:.7rem;padding:3px 8px" onclick="rules.splice('+i+',1);renderRules();">×</button></div>';
  }).join('');
}
function addRule(){var c='N';rules.push({kw:'',cat:c,name:'自定义'});renderRules();}
function resetRules(){location.reload();}
function saveRules(){}

// ====== UPLOAD ======
function handleUpload(inputEl) {
  var file = inputEl.files[0];
  if (!file) return;
  showStatus('读取中...');
  var reader = new FileReader();
  reader.onerror = function(){showStatus('读取失败');};
  reader.onload = function(e){
    try {
      var wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
      var csv = XLSX.utils.sheet_to_csv(wb.Sheets[wb.SheetNames[0]], {FS:'\t', blankrows:false, strip:true});
      document.getElementById('rawInput').value = csv;
      var n = csv.split(/\r?\n/).filter(function(l){return l.trim();}).length;
      showStatus('已加载 '+n+' 行');
      inputEl.value = '';
      doClassify();
    } catch(err) {
      alert('文件解析失败：'+err.message);
      showStatus('');
    }
  };
  reader.readAsArrayBuffer(file);
}
function showStatus(msg) {
  var el = document.getElementById('status');
  el.textContent = msg;
  el.classList.toggle('hidden', !msg);
}

// ====== CLASSIFY ======
function doClassify() {
  var text = document.getElementById('rawInput').value.trim();
  if (!text) return;

  entries = [];
  var lines = text.split(/\r?\n/).filter(function(l){return l.trim();});
  document.getElementById('parseCount').textContent = lines.length;

  lines.forEach(function(line){
    var cols = line.split('\t');
    if (cols.length < 2) cols = line.split('|').map(function(c){return c.trim();});
    if (cols.length < 2) cols = line.split(/ {2,}/);
    if (cols.length < 2) cols = line.split(',');

    var date='', amt=null, desc='';
    cols.forEach(function(c){
      var v = c.trim();
      if (!v) return;
      var n = parseFloat(v.replace(/[¥￥,]/g,''));
      if (!isNaN(n) && n > 0) { if (amt === null) amt = n; }
      else if (/\d{4}[./-]\d{1,2}[./-]\d{1,2}/.test(v) || /^\d{1,2}[./月]\d{1,2}[日号]?$/.test(v)) date = v;
      else if (v.length >= 2) desc = desc ? desc + ' ' + v : v;
    });
    if (!desc && !amt) return;
    if (desc && desc.length > 80) desc = desc.slice(0,80);

    var cat='X', kw='';
    var lower = (desc||'').toLowerCase();
    rules.forEach(function(r){
      r.kw.split(/[,\uff0c\u3001]/).forEach(function(k){
        var kk = k.trim().toLowerCase();
        if (kk && lower.indexOf(kk) >= 0) { cat = r.cat; kw = k.trim(); }
      });
    });
    entries.push({date:date||'', desc:desc||'', amount:amt||0, cat:cat, kw:kw});
  });

  renderCatChips();
  renderSummary();
  renderDetail();
  document.getElementById('resultArea').classList.remove('hidden');
}

// ====== RENDER ======
function renderCatChips() {
  var chips = document.getElementById('catChips'); if(!chips) return;
  var totals = {};
  entries.forEach(function(e){if(!totals[e.cat])totals[e.cat]=0;totals[e.cat]+=e.amount;});
  chips.innerHTML = rules.map(function(r){
    var t = totals[r.cat]||0;
    return '<span class="cat-badge '+catBg[r.cat]+'" style="opacity:'+(t?'1':'.4')+'">'+r.name+(t?' ¥'+t.toFixed(0):'')+'</span>';
  }).join('');
}

function renderSummary() {
  var cats = {}, total = 0;
  entries.forEach(function(e){
    if(!cats[e.cat]) cats[e.cat] = {count:0, amount:0};
    cats[e.cat].count++; cats[e.cat].amount += e.amount;
    total += e.amount;
  });
  var nameMap = {}; rules.forEach(function(r){nameMap[r.cat]=r.name;}); nameMap['X']='未匹配';

  // Pie
  var stops=[], cum=0;
  var sorted = Object.entries(cats).sort(function(a,b){return b[1].amount - a[1].amount;});
  sorted.forEach(function(p){
    var pct = total ? p[1].amount/total*100 : 0;
    if (pct > 0) stops.push(catColor[p[0]]+' '+cum+'% '+(cum+pct)+'%');
    cum += pct;
  });
  document.getElementById('pieChart').style.background = stops.length ? 'conic-gradient('+stops.join(',')+')' : '';

  document.getElementById('pieLegend').innerHTML = sorted.map(function(p){
    var pct = total?(p[1].amount/total*100).toFixed(1):0;
    return '<span><span class="dot" style="background:'+catColor[p[0]]+'"></span> '+nameMap[p[0]]+' <strong>¥'+p[1].amount.toFixed(0)+'</strong> ('+pct+'%)</span>';
  }).join('');

  // Summary grid
  var unmatched = cats['X'] || {count:0, amount:0};
  document.getElementById('summaryGrid').innerHTML =
    '<div class="summary-card" style="border-left-color:#3b82f6"><div class="value">¥'+total.toFixed(2)+'</div><div class="label">报销总额</div></div>'+
    '<div class="summary-card" style="border-left-color:#16a34a"><div class="value">'+entries.length+'</div><div class="label">条目总数</div></div>'+
    '<div class="summary-card" style="border-left-color:#8b5cf6"><div class="value">'+(Object.keys(cats).length-(cats.X?1:0))+'</div><div class="label">覆盖科目</div></div>'+
    '<div class="summary-card" style="border-left-color:#ef4444"><div class="value" style="color:#ef4444">'+unmatched.count+'</div><div class="label">未匹配 (¥'+unmatched.amount.toFixed(0)+')</div></div>';

  // Cat summary table
  var maxAmt = Math.max(1, ...Object.values(cats).map(function(d){return d.amount;}));
  document.getElementById('catSummaryBody').innerHTML = sorted.map(function(p){
    var pct = total ? (p[1].amount/total*100).toFixed(1) : 0;
    return '<tr><td style="font-weight:600">'+nameMap[p[0]]+'</td><td>'+p[1].count+'</td><td style="font-weight:600;text-align:right">¥'+p[1].amount.toFixed(2)+'</td><td style="text-align:right">'+pct+'%</td><td><span class="bar"><span class="bar-fill" style="width:'+(p[1].amount/maxAmt*100)+'%;background:'+catColor[p[0]]+'"></span></span></td></tr>';
  }).join('');
}

function renderDetail() {
  var nameMap = {}; rules.forEach(function(r){nameMap[r.cat]=r.name;}); nameMap['X']='未匹配';
  document.getElementById('detailBody').innerHTML = entries.map(function(e,i){
    return '<tr'+(e.cat==='X'?' style="background:#fff5f5"':'')+'>'+
      '<td>'+(i+1)+'</td><td>'+(e.date||'-')+'</td><td>'+(e.desc||'-')+'</td><td class="num" style="font-weight:600">¥'+e.amount.toFixed(2)+'</td>'+
      '<td><span class="cat-badge '+catBg[e.cat]+'">'+nameMap[e.cat]+'</span></td>'+
      '<td style="font-size:.78rem;color:'+(e.cat==='X'?'#ef4444':'#6b7280')+'">'+(e.cat==='X'?'⚠ 未匹配':e.kw||'—')+'</td></tr>';
  }).join('');
}

function clearAll() {
  document.getElementById('rawInput').value = '';
  document.getElementById('parseCount').textContent = '0';
  document.getElementById('resultArea').classList.add('hidden');
  document.getElementById('status').textContent = '';
  document.getElementById('status').classList.add('hidden');
  entries = [];
}

// ====== EXPORT ======
function exportResult() {
  if (!entries.length) { alert('没有数据可导出'); return; }
  var nameMap = {}; rules.forEach(function(r){nameMap[r.cat]=r.name;}); nameMap['X']='未匹配';
  var data = entries.map(function(e,i){
    return {序号:i+1,日期:e.date,摘要:e.desc,金额:e.amount,科目:nameMap[e.cat],代码:e.cat,关键词:e.kw||''};
  });
  var ws = XLSX.utils.json_to_sheet(data);
  ws['!cols'] = [{wch:5},{wch:14},{wch:42},{wch:12},{wch:14},{wch:8},{wch:12}];
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '费用分类明细');
  XLSX.writeFile(wb, '费用报销分类_'+new Date().toISOString().slice(0,10)+'.xlsx');
}

// ====== INIT ======
renderRules();
</script>
</body>
</html>
